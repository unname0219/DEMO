name: Build and Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: Linux-x64
            artifact_name: FireflyPlayer-Linux-x64
          - os: windows-2022
            name: Windows-x64
            artifact_name: FireflyPlayer-Windows-x64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version info
        id: version
        shell: bash
        run: |
          VERSION=$(grep -oP 'project\(FireflyPlayer VERSION \K[0-9.]+' CMakeLists.txt)
          BUILD_ID=$(date +'%Y%m%d')-$(git rev-parse --short HEAD)
          RELEASE_NAME="v${VERSION}-${BUILD_ID}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT

      - name: Install Qt6 (Linux)
        if: runner.os == 'Linux'
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.3'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          modules: 'qtmultimedia'
          cache: 'true'

      - name: Install Qt6 (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtmultimedia'
          cache: 'true'

      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "Downloading FFmpeg MSVC prebuilt from System233..."
          $FFMPEG_URL = "https://github.com/System233/ffmpeg-msvc-prebuilt/releases/download/ffmpeg-7.1.5/ffmpeg-7.1.5_x64-windows-shared-gpl.zip"
          Invoke-WebRequest -Uri $FFMPEG_URL -OutFile "ffmpeg.zip" -UseBasicParsing
          Write-Host "Extracting FFmpeg..."
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg" -Force
          # System233 zip 解压后直接是 ffmpeg/include, ffmpeg/lib, ffmpeg/bin (无外层目录)
          # 或 ffmpeg/<subdir>/include (有外层目录)，两种情况都处理
          $ffmpegBase = (Resolve-Path "ffmpeg").Path
          $ffmpegDir = $null
          if (Test-Path "$ffmpegBase\include") {
            $ffmpegDir = $ffmpegBase
          } else {
            $subDirs = Get-ChildItem -Directory -Path $ffmpegBase
            foreach ($subDir in $subDirs) {
              if (Test-Path "$($subDir.FullName)\include") {
                $ffmpegDir = $subDir.FullName
                break
              }
            }
          }
          if (-not $ffmpegDir) {
            Write-Error "Could not find FFmpeg include directory in $ffmpegBase"
            Get-ChildItem -Recurse $ffmpegBase | Select-Object FullName | Format-Table -AutoSize
            exit 1
          }
          echo "FFMPEG_DIR=$ffmpegDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "FFmpeg installed at: $ffmpegDir"
          Write-Host "=== Directory structure ==="
          Get-ChildItem $ffmpegDir | Format-Table Name, Mode -AutoSize
          if (Test-Path "$ffmpegDir\lib") {
            Write-Host "=== Lib files ==="
            Get-ChildItem "$ffmpegDir\lib" | Format-Table Name -AutoSize
          }
          if (Test-Path "$ffmpegDir\bin") {
            Write-Host "=== Dll files ==="
            Get-ChildItem "$ffmpegDir\bin" -Filter "*.dll" | Format-Table Name -AutoSize
          }
          if (Test-Path "$ffmpegDir\include") {
            Write-Host "=== Include subdirs ==="
            Get-ChildItem "$ffmpegDir\include" -Directory | Format-Table Name -AutoSize
          }

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libfuse2 libgl1-mesa-dev libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-xinerama0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libpulse0 libva2 libvdpau1 libsoundtouch-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir build
          cd build
          $ffmpegDir = $env:FFMPEG_DIR
          if (-not $ffmpegDir) {
            Write-Error "FFMPEG_DIR is not set!"
            exit 1
          }
          Write-Host "Using FFMPEG_ROOT=$ffmpegDir"
          cmake .. -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DFFMPEG_ROOT="$ffmpegDir" `
            -DAVCODEC_INCLUDE_DIR="$ffmpegDir/include" `
            -DAVCODEC_LIBRARY="$ffmpegDir/lib/avcodec.lib" `
            -DAVFORMAT_INCLUDE_DIR="$ffmpegDir/include" `
            -DAVFORMAT_LIBRARY="$ffmpegDir/lib/avformat.lib" `
            -DAVUTIL_INCLUDE_DIR="$ffmpegDir/include" `
            -DAVUTIL_LIBRARY="$ffmpegDir/lib/avutil.lib" `
            -DSWSCALE_INCLUDE_DIR="$ffmpegDir/include" `
            -DSWSCALE_LIBRARY="$ffmpegDir/lib/swscale.lib" `
            -DSWRESAMPLE_INCLUDE_DIR="$ffmpegDir/include" `
            -DSWRESAMPLE_LIBRARY="$ffmpegDir/lib/swresample.lib"

      - name: Build
        shell: bash
        run: |
          cd build
          cmake --build . --config Release -j$(nproc 2>/dev/null || echo 4)

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          set -e
          cd build
          echo "=== 构建产物 ==="
          ls -la bin/ || echo "bin目录不存在"
          file bin/FireflyPlayer || echo "FireflyPlayer不存在"

          # 创建打包目录
          mkdir -p package
          cp bin/FireflyPlayer package/

          # 打包二进制和依赖
          cd package
          tar -czf ../FireflyPlayer-Linux-x64.tar.gz .
          cd ..

          # 验证打包结果
          echo "=== 打包结果 ==="
          ls -la FireflyPlayer-Linux-x64.tar.gz
          tar -tzf FireflyPlayer-Linux-x64.tar.gz

      - name: Deploy Qt libraries (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cd build\bin\Release
          windeployqt FireflyPlayer.exe --no-translations --no-system-d3d-compiler --no-opengl-sw --release
          echo Copying FFmpeg DLLs from %FFMPEG_DIR%\bin...
          copy /Y "%FFMPEG_DIR%\bin\*.dll" .
          dir

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd build
          Compress-Archive -Path bin\Release\* -DestinationPath FireflyPlayer-Windows-x64.zip -Force
          Write-Host "=== 打包结果 ==="
          Get-ChildItem FireflyPlayer-Windows-x64.zip | Select-Object Name, Length

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            build/FireflyPlayer-*.tar.gz
            build/FireflyPlayer-*.zip
          retention-days: 7

    outputs:
      version: ${{ steps.version.outputs.version }}
      build_id: ${{ steps.version.outputs.build_id }}
      release_name: ${{ steps.version.outputs.release_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Publish Release
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release info
        id: release_info
        run: |
          RELEASE_NAME="${{ needs.build.outputs.release_name }}"
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT
          echo "tag_name=$RELEASE_NAME" >> $GITHUB_OUTPUT

          # 生成更新日志
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          {
            echo "## 更新内容"
            echo ""
            if [ -n "$LAST_TAG" ]; then
              git log --pretty=format:"- %s (%h)" $LAST_TAG..HEAD
            else
              git log --pretty=format:"- %s (%h)" -20
            fi
            echo ""
            echo ""
            echo "**版本**: ${{ needs.build.outputs.version }}"
            echo "**构建号**: ${{ needs.build.outputs.build_id }}"
            echo "**提交**: ${{ github.sha }}"
            echo ""
            echo "### 下载"
            echo "- **Windows**: \`FireflyPlayer-Windows-x64.zip\` - 解压后运行 FireflyPlayer.exe"
            echo "- **Linux**: \`FireflyPlayer-Linux-x64.tar.gz\` - 解压后运行 FireflyPlayer"
          } > CHANGELOG.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "=== 下载的构建产物 ==="
          find artifacts -type f -exec ls -lh {} \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag_name }}
          name: ${{ steps.release_info.outputs.release_name }}
          body_path: CHANGELOG.md
          files: |
            artifacts/FireflyPlayer-Linux-x64/*
            artifacts/FireflyPlayer-Windows-x64/*
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean old auto-build releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 3
          delete_tags: true
          delete_tag_pattern: "v1."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
